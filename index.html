<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Exercise Timer">
<meta name="theme-color" content="#ffffff">
<title>Exercise Timer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --teal: #1D9E75; --teal-bg: #E1F5EE; --teal-text: #085041;
    --blue: #378ADD; --amber: #BA7517; --amber-bg: #FAEEDA; --amber-text: #633806;
    --coral: #D85A30; --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #3C3489;
    --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
    --text: #1a1a18; --text2: #6b6b67; --text3: #9b9b97;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --radius: 10px; --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --teal: #5DCAA5; --teal-bg: #04342C; --teal-text: #9FE1CB;
      --blue: #85B7EB; --amber: #EF9F27; --amber-bg: #412402; --amber-text: #FAC775;
      --coral: #F0997B; --purple: #AFA9EC; --purple-bg: #26215C; --purple-text: #CECBF6;
      --bg: #1c1c1a; --bg2: #2a2a28; --bg3: #333331;
      --text: #f0f0ec; --text2: #9b9b97; --text3: #6b6b67;
      --border: rgba(255,255,255,0.12); --border2: rgba(255,255,255,0.22);
    }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  #app { width: 100%; max-width: 420px; padding: 1rem 1rem 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100svh; }

  .header { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 1rem; gap: 10px; }
  .title-block h1 { font-size: 18px; font-weight: 600; color: var(--text); }
  .title-block p { font-size: 12px; color: var(--text2); }
  .app-switch { display: flex; border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border2); flex-shrink: 0; }
  .app-btn { padding: 8px 16px; border: none; background: var(--bg2); color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .app-btn:first-child { border-right: 0.5px solid var(--border2); }
  .app-btn.active.kegel { background: var(--teal-bg); color: var(--teal-text); }
  .app-btn.active.ved { background: var(--purple-bg); color: var(--purple-text); }

  .tabs { display: flex; gap: 6px; width: 100%; margin-bottom: 1rem; background: var(--bg2); border-radius: var(--radius-lg); padding: 4px; }
  .tab { flex: 1; padding: 7px 0; border-radius: var(--radius); border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
  .tab.active { background: var(--bg); color: var(--text); box-shadow: 0 0 0 0.5px var(--border2); }

  .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; margin-bottom: 1rem; }
  .sc { background: var(--bg2); border-radius: var(--radius); padding: 9px 11px; }
  .sl { font-size: 11px; color: var(--text2); margin-bottom: 5px; letter-spacing: 0.03em; }
  .sr { display: flex; align-items: center; gap: 6px; }
  .sr button { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; -webkit-tap-highlight-color: transparent; }
  .sr button:active { transform: scale(0.9); }
  .sv { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; text-align: center; }

  .set-banner { font-size: 12px; font-weight: 600; padding: 4px 14px; border-radius: var(--radius); margin-bottom: 0.6rem; display: none; letter-spacing: 0.02em; }

  .ring-wrap { position: relative; width: 210px; height: 210px; margin: 0 auto 0.8rem; flex-shrink: 0; }
  #progress-ring { transform: rotate(-90deg); }
  #ring-bg { fill: none; stroke: var(--bg3); stroke-width: 11; }
  #ring-fill { fill: none; stroke-width: 11; stroke-linecap: round; transition: stroke-dashoffset 0.1s linear, stroke 0.3s; }
  .ring-inner { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  #phase-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text2); }
  #time-display { font-size: 52px; font-weight: 600; color: var(--text); line-height: 1; letter-spacing: -2px; }
  #rep-display { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .controls { display: flex; gap: 10px; align-items: center; justify-content: center; margin-bottom: 0.8rem; }
  .btn-main { padding: 0 32px; height: 48px; border-radius: 24px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); font-size: 16px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform 0.1s; }
  .btn-main:active { transform: scale(0.96); }
  .btn-main.go.kegel { background: var(--teal-bg); color: var(--teal-text); border-color: var(--teal); }
  .btn-main.go.ved { background: var(--purple-bg); color: var(--purple-text); border-color: var(--purple); }
  .btn-icon { width: 48px; height: 48px; border-radius: 50%; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .btn-icon:active { transform: scale(0.93); }

  .dots { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; min-height: 14px; margin-bottom: 0.5rem; width: 100%; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg3); transition: background 0.25s; }
  .dot.slow-done { background: var(--teal); } .dot.slow-cur { background: var(--blue); }
  .dot.flick-done { background: var(--amber); } .dot.flick-cur { background: var(--coral); }
  .dot.ved-done { background: var(--purple); } .dot.ved-cur { background: var(--blue); }

  .done-msg { font-size: 15px; color: var(--text2); padding: 0.5rem 0; display: none; text-align: center; }
  .install-hint { margin-top: auto; padding-top: 1rem; font-size: 12px; color: var(--text3); text-align: center; line-height: 1.6; max-width: 300px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="title-block">
      <h1 id="app-title">Kegel Timer</h1>
      <p id="app-sub">Pelvic floor training</p>
    </div>
    <div class="app-switch">
      <button class="app-btn kegel active" id="appbtn-kegel" onclick="switchApp('kegel')">Kegels</button>
      <button class="app-btn ved" id="appbtn-ved" onclick="switchApp('ved')">VED</button>
    </div>
  </div>

  <div id="panel-kegel" style="width:100%;">
    <div class="tabs">
      <button class="tab" id="tab-slow" onclick="setMode('slow')">Slow holds</button>
      <button class="tab" id="tab-flick" onclick="setMode('flick')">Quick flicks</button>
      <button class="tab active" id="tab-both" onclick="setMode('both')">Both sets</button>
    </div>
    <div class="settings" id="slow-settings">
      <div class="sc"><div class="sl">Squeeze (sec)</div><div class="sr"><button onclick="adj('squeeze',-1)">−</button><span class="sv" id="val-squeeze">10</span><button onclick="adj('squeeze',1)">+</button></div></div>
      <div class="sc"><div class="sl">Rest (sec)</div><div class="sr"><button onclick="adj('rest',-1)">−</button><span class="sv" id="val-rest">10</span><button onclick="adj('rest',1)">+</button></div></div>
      <div class="sc"><div class="sl">Reps</div><div class="sr"><button onclick="adj('reps',-1)">−</button><span class="sv" id="val-reps">10</span><button onclick="adj('reps',1)">+</button></div></div>
      <div class="sc"><div class="sl">Prepare (sec)</div><div class="sr"><button onclick="adj('prepare',-1)">−</button><span class="sv" id="val-prepare">3</span><button onclick="adj('prepare',1)">+</button></div></div>
    </div>
    <div class="settings" id="flick-settings">
      <div class="sc"><div class="sl">On (sec)</div><div class="sr"><button onclick="adj('fOn',-1)">−</button><span class="sv" id="val-fOn">1</span><button onclick="adj('fOn',1)">+</button></div></div>
      <div class="sc"><div class="sl">Off (sec)</div><div class="sr"><button onclick="adj('fOff',-1)">−</button><span class="sv" id="val-fOff">1</span><button onclick="adj('fOff',1)">+</button></div></div>
      <div class="sc"><div class="sl">Flicks</div><div class="sr"><button onclick="adj('fReps',-1)">−</button><span class="sv" id="val-fReps">15</span><button onclick="adj('fReps',1)">+</button></div></div>
      <div class="sc"><div class="sl">Prepare (sec)</div><div class="sr"><button onclick="adj('fPrepare',-1)">−</button><span class="sv" id="val-fPrepare">3</span><button onclick="adj('fPrepare',1)">+</button></div></div>
    </div>
  </div>

  <div id="panel-ved" style="display:none; width:100%;">
    <div class="settings">
      <div class="sc"><div class="sl">Pump (sec)</div><div class="sr"><button onclick="adjV('vDur',-5)">−</button><span class="sv" id="val-vDur">60</span><button onclick="adjV('vDur',5)">+</button></div></div>
      <div class="sc"><div class="sl">Rest (sec)</div><div class="sr"><button onclick="adjV('vRest',-5)">−</button><span class="sv" id="val-vRest">15</span><button onclick="adjV('vRest',5)">+</button></div></div>
      <div class="sc"><div class="sl">Cycles</div><div class="sr"><button onclick="adjV('vReps',-1)">−</button><span class="sv" id="val-vReps">10</span><button onclick="adjV('vReps',1)">+</button></div></div>
      <div class="sc"><div class="sl">Prepare (sec)</div><div class="sr"><button onclick="adjV('vPrepare',-1)">−</button><span class="sv" id="val-vPrepare">3</span><button onclick="adjV('vPrepare',1)">+</button></div></div>
    </div>
  </div>

  <div class="set-banner" id="set-banner"></div>

  <div class="ring-wrap">
    <svg id="progress-ring" width="210" height="210" viewBox="0 0 210 210">
      <circle id="ring-bg" cx="105" cy="105" r="94"/>
      <circle id="ring-fill" cx="105" cy="105" r="94"/>
    </svg>
    <div class="ring-inner">
      <div id="phase-label">Ready</div>
      <div id="time-display">—</div>
      <div id="rep-display"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-icon" onclick="resetTimer()">↺</button>
    <button class="btn-main go kegel" id="btn-start" onclick="toggleTimer()">Start</button>
    <button class="btn-icon" id="btn-sound" onclick="toggleSound()">🔔</button>
  </div>
  <div class="dots" id="rep-dots"></div>
  <div class="done-msg" id="done-msg">🎉 Session complete!</div>
  <p class="install-hint" id="install-hint"></p>
</div>

<script>
const cfg={squeeze:10,rest:10,reps:10,prepare:3,fOn:1,fOff:1,fReps:15,fPrepare:3};
const limits={squeeze:[2,30],rest:[2,30],reps:[1,30],prepare:[0,10],fOn:[1,5],fOff:[1,5],fReps:[5,30],fPrepare:[0,10]};
const vedCfg={vDur:60,vRest:15,vReps:10,vPrepare:3};
const vedLimits={vDur:[10,180],vRest:[5,60],vReps:[1,20],vPrepare:[0,10]};
let app='kegel',mode='both',soundOn=true,running=false,iv=null,phase='idle',phaseTime=0,totalTime=0,repsDone=0,currentSet='slow';
const circ=2*Math.PI*94;
const ring=document.getElementById('ring-fill'),timeEl=document.getElementById('time-display');
const phaseEl=document.getElementById('phase-label'),repEl=document.getElementById('rep-display');
const dotsEl=document.getElementById('rep-dots'),doneMsg=document.getElementById('done-msg');
const btnStart=document.getElementById('btn-start'),banner=document.getElementById('set-banner');
ring.style.strokeDasharray=circ;ring.style.strokeDashoffset=circ;

function switchApp(a){if(running)return;app=a;
  document.getElementById('appbtn-kegel').className='app-btn kegel'+(a==='kegel'?' active':'');
  document.getElementById('appbtn-ved').className='app-btn ved'+(a==='ved'?' active':'');
  document.getElementById('panel-kegel').style.display=a==='kegel'?'':'none';
  document.getElementById('panel-ved').style.display=a==='ved'?'block':'none';
  document.getElementById('app-title').textContent=a==='kegel'?'Kegel Timer':'VED Timer';
  document.getElementById('app-sub').textContent=a==='kegel'?'Pelvic floor training':'Vacuum erection device';
  resetTimer();}
function setMode(m){if(running)return;mode=m;
  ['slow','flick','both'].forEach(x=>document.getElementById('tab-'+x).classList.toggle('active',x===m));
  document.getElementById('slow-settings').style.display=m==='flick'?'none':'grid';
  document.getElementById('flick-settings').style.display=m==='slow'?'none':'grid';
  resetTimer();}
function adj(k,d){if(running)return;const[mn,mx]=limits[k];cfg[k]=Math.min(mx,Math.max(mn,cfg[k]+d));document.getElementById('val-'+k).textContent=cfg[k];buildDots();}
function adjV(k,d){if(running)return;const[mn,mx]=vedLimits[k];vedCfg[k]=Math.min(mx,Math.max(mn,vedCfg[k]+d));document.getElementById('val-'+k).textContent=vedCfg[k];buildDots();}
function buildDots(){dotsEl.innerHTML='';let total,curC,doneC;
  if(app==='ved'){total=vedCfg.vReps;curC='ved-cur';doneC='ved-done';}
  else{const f=currentSet==='flick';total=f?cfg.fReps:cfg.reps;curC=f?'flick-cur':'slow-cur';doneC=f?'flick-done':'slow-done';}
  for(let i=0;i<total;i++){const d=document.createElement('div');let c='dot';if(i<repsDone)c+=' '+doneC;else if(i===repsDone&&phase!=='idle')c+=' '+curC;d.className=c;dotsEl.appendChild(d);}}
function beep(f,d,delay=0){if(!soundOn)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;o.type='sine';const t=ctx.currentTime+delay;g.gain.setValueAtTime(0.13,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d);}catch(e){}}
function setRing(p,c){ring.style.strokeDashoffset=circ*(1-Math.max(0,Math.min(1,p)));ring.style.stroke=c;}
const pColors={prepare:'#BA7517',squeeze:'#1D9E75',rest:'#378ADD',flick:'#D85A30',flickOff:'#378ADD',flickPrepare:'#BA7517',pump:'#534AB7',pumpRest:'#378ADD',pumpPrepare:'#BA7517'};
const pLabels={prepare:'Prepare',squeeze:'Squeeze!',rest:'Rest',flick:'Flick!',flickOff:'Off',flickPrepare:'Prepare',pump:'Pump!',pumpRest:'Release',pumpPrepare:'Prepare'};
function startPhase(p,dur){phase=p;phaseTime=dur;totalTime=dur;phaseEl.textContent=pLabels[p]||p;phaseEl.style.color=pColors[p]||'#BA7517';if(p==='squeeze'||p==='pump')beep(880,0.12);else if(p==='rest'||p==='pumpRest')beep(440,0.12);else if(p==='flick')beep(1000,0.07);else if(p==='flickOff')beep(500,0.06);else beep(660,0.09);}
function showBanner(s){if(mode!=='both'||app!=='kegel'){banner.style.display='none';return;}banner.style.display='inline-block';if(s==='slow'){banner.style.background='#E1F5EE';banner.style.color='#085041';banner.textContent='Set 1 — slow holds';}else{banner.style.background='#FAEEDA';banner.style.color='#633806';banner.textContent='Set 2 — quick flicks';}}
function tick(){if(app==='ved'){tickVed();return;}
  if(phaseTime<=0){if(phase==='prepare'||phase==='flickPrepare'){startPhase(currentSet==='slow'?'squeeze':'flick',currentSet==='slow'?cfg.squeeze:cfg.fOn);}
  else if(phase==='squeeze'){startPhase('rest',cfg.rest);}
  else if(phase==='rest'){repsDone++;buildDots();if(repsDone>=cfg.reps){if(mode==='both'){startFlickSet();return;}finish();return;}startPhase('squeeze',cfg.squeeze);}
  else if(phase==='flick'){startPhase('flickOff',cfg.fOff);}
  else if(phase==='flickOff'){repsDone++;buildDots();if(repsDone>=cfg.fReps){finish();return;}startPhase('flick',cfg.fOn);}}
  setRing(1-(phaseTime/totalTime),pColors[phase]||'#BA7517');timeEl.textContent=phaseTime;
  const tot=currentSet==='flick'?cfg.fReps:cfg.reps;repEl.textContent=(phase!=='prepare'&&phase!=='flickPrepare')?`Rep ${repsDone+1} of ${tot}`:'';phaseTime--;}
function tickVed(){if(phaseTime<=0){if(phase==='pumpPrepare'){startPhase('pump',vedCfg.vDur);}
  else if(phase==='pump'){startPhase('pumpRest',vedCfg.vRest);}
  else if(phase==='pumpRest'){repsDone++;buildDots();if(repsDone>=vedCfg.vReps){finish();return;}startPhase('pump',vedCfg.vDur);}}
  setRing(1-(phaseTime/totalTime),pColors[phase]||'#534AB7');timeEl.textContent=phaseTime;repEl.textContent=phase!=='pumpPrepare'?`Cycle ${repsDone+1} of ${vedCfg.vReps}`:'';phaseTime--;}
function startFlickSet(){clearInterval(iv);currentSet='flick';repsDone=0;showBanner('flick');buildDots();beep(880,0.08);beep(1100,0.1,0.18);if(cfg.fPrepare>0)startPhase('flickPrepare',cfg.fPrepare);else startPhase('flick',cfg.fOn);tick();iv=setInterval(tick,1000);}
function finish(){clearInterval(iv);running=false;beep(880,0.08);beep(1100,0.1,0.15);beep(1320,0.15,0.3);phase='done';phaseEl.textContent='Done!';const fc=app==='ved'?'#534AB7':'#1D9E75';phaseEl.style.color=fc;timeEl.textContent='✓';repEl.textContent='';setRing(1,fc);doneMsg.style.display='block';btnStart.textContent='Start';btnStart.className='btn-main go '+app;}
function toggleTimer(){if(!running&&(phase==='idle'||phase==='done')){resetTimer(true);running=true;btnStart.textContent='Pause';btnStart.className='btn-main';doneMsg.style.display='none';
  if(app==='ved'){buildDots();if(vedCfg.vPrepare>0)startPhase('pumpPrepare',vedCfg.vPrepare);else startPhase('pump',vedCfg.vDur);}
  else{currentSet=mode==='flick'?'flick':'slow';showBanner(currentSet);buildDots();const prep=currentSet==='flick'?cfg.fPrepare:cfg.prepare;const pp=currentSet==='flick'?'flickPrepare':'prepare';if(prep>0)startPhase(pp,prep);else startPhase(currentSet==='flick'?'flick':'squeeze',currentSet==='flick'?cfg.fOn:cfg.squeeze);}
  tick();iv=setInterval(tick,1000);}
  else if(running){running=false;clearInterval(iv);btnStart.textContent='Resume';btnStart.className='btn-main go '+app;}
  else{running=true;btnStart.textContent='Pause';btnStart.className='btn-main';tick();iv=setInterval(tick,1000);}}
function resetTimer(s){clearInterval(iv);running=false;repsDone=0;phase='idle';currentSet=mode==='flick'?'flick':'slow';phaseEl.textContent='Ready';phaseEl.style.color='var(--text2)';timeEl.textContent='—';repEl.textContent='';setRing(0,'var(--bg3)');doneMsg.style.display='none';btnStart.textContent='Start';btnStart.className='btn-main go '+app;banner.style.display='none';buildDots();}
function toggleSound(){soundOn=!soundOn;document.getElementById('btn-sound').textContent=soundOn?'🔔':'🔕';}
const hint=document.getElementById('install-hint');
const ua=navigator.userAgent;
if(/iPhone|iPad/.test(ua)){hint.textContent='Tip: tap the Share button in Safari, then "Add to Home Screen" to use this as an app.';}
else if(/Android/.test(ua)){hint.textContent='Tip: tap the menu in Chrome, then "Add to Home Screen" to use this as an app.';}
buildDots();
</script>
</body>
</html>
